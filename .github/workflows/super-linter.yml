name: Lint and Fix Code

on: [push]

jobs:
  run-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to save fixes back to your repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint and Fix Code
        uses: super-linter/super-linter@v7
        env:
          # Change this to true to fix EVERYTHING currently in the repo
          VALIDATE_ALL_CODEBASE: true 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enable fixing for common languages (add more as needed)
          FIX_PYTHON: true
          FIX_JAVASCRIPT_PRETTIER: true
          FIX_MARKDOWN: true
          FIX_CSS: true

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix linting issues"
